# Prometheus scrape config — Phase 1 skeleton.
# The ACT bot runs on the Windows HOST (not in a container), so Prometheus
# running inside WSL2 Docker reaches it via host.docker.internal (aliased to
# host-gateway in docker-compose.yml).

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: act
    host: rtx5090

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ACT trading bot — /metrics exposed on localhost:9090 by prometheus-client
  # (Phase 1 will register the endpoint in src/orchestration/metrics.py).
  # We use a non-standard bot port (9091) to avoid collision with Prometheus
  # itself. Phase 1 will wire this up.
  - job_name: act-bot
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9091"]
        labels:
          component: trading_bot

  # Phase 2: OTel collector self-metrics. Exposes its own pipeline health
  # (queue depth, dropped spans, export errors) on :8888 by default — see
  # infra/otel/otel-config.yaml's `service.telemetry.metrics` block.
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          component: otel_collector

  # Phase 2: Redis is scraped via redis-exporter rather than the server
  # directly (Redis doesn't speak the Prometheus exposition format). Add
  # the exporter to docker-compose.yml when you need it; the job config
  # is here so the scrape target is stable.
  # - job_name: redis
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]
  #       labels:
  #         component: redis
