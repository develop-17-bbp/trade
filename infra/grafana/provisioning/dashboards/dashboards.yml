# Auto-provision dashboards from /var/lib/grafana/dashboards inside the
# container (bind-mounted from infra/grafana/dashboards/ on the host).
# Phase 1 will drop the first dashboard JSON into that folder.

apiVersion: 1

providers:
  - name: act
    orgId: 1
    folder: ACT
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
