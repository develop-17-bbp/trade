  spread_pct_per_side: 0.005        # SIP. IEX paper-soak adjustment in stocks_conviction.
  round_trip_spread_pct: 0.01
  min_expected_move_pct: 0.15       # SIP threshold. IEX bumps to 0.25 via stocks_conviction.
  intraday_position_pct_max: 15     # default for 1× ETFs (SPY/QQQ)
  overnight_position_pct_max: 5     # default for 1× ETFs
  leveraged_intraday_pct_max: 5     # TQQQ/SOXL hard cap regardless of conviction
  leveraged_overnight_pct_max: 0    # TQQQ/SOXL forced flat-by-EOD
  pre_close_blackout_min: 5         # all symbols
  leveraged_pre_close_blackout_min: 30  # TQQQ/SOXL only
  rth_only: true
  longs_only: false                 # short via inverse ETFs (SOXS/SQQQ); native shorts ETB-gated
