# ── General Settings ──
mode: live                     # execution mode: 'live' (Robinhood real account)
poll_interval: 60             # check every 60s — 4h/daily candles don't need fast polling

# ── Exchange Configuration ──
exchanges:
  - name: robinhood
    assets: [BTC, ETH]
    spread_pct_per_side: 1.67        # Measured Robinhood spread per side
    round_trip_spread_pct: 3.34      # Total cost to enter + exit
    min_expected_move_pct: 7.0       # Only enter if expected move > 7% (2x spread)
    longs_only: true                 # No shorts on Robinhood spot

# Primary exchange
exchange:
  name: robinhood

# ── Assets ──
assets:
  - BTC
  - ETH

initial_capital: 100000.0

# ── EMA Crossover Strategy (Robinhood Spread-Adapted) ──
# Robinhood spread ~1.67% round-trip ~3.3% — need 5%+ moves to profit
# Only trade 4h/1d signals — catch multi-day swings
adaptive:
  ema_crossover_primary: true
  ema_period: 8                                # EMA period (matches chart)
  struct_window: 5                             # Structure points for SL (L1->L4)
  min_entry_score: 6                           # Only high-quality setups
  max_entry_score: 15                          # Don't cap strong momentum (daily TF = bigger scores)
  short_score_penalty: 4                       # SHORTs need score 10+ (6+4) — LONG bias in crypto
  sr_assets: [ETH]                             # S/R levels for ETH only
  signal_timeframes: [4h, 1d]                 # Robinhood: only 4h and daily — need 5%+ moves

# ── Risk (Robinhood Spread-Adapted) ──
# Must overcome 3.3% round-trip spread cost
# Wider everything: SL, TP, hold time, position size
risk:
  daily_loss_limit_pct: 5.0                    # Swing trades need room
  max_drawdown_pct: 15.0                       # Multi-day holds can swing
  risk_per_trade_pct: 1.0                      # Conservative sizing until WR improves (was 2.0%)
  atr_stop_mult: 8.0                           # Wide SL for Robinhood 3.34% spread (8×ATR ≈ 3.5% for BTC, survives noise)
  atr_tp_mult: 25.0                            # TP = 25×ATR — target 10%+ moves, nets ~7% after 3.34% spread
  hard_stop_pct: -12.0                         # Hard stop at -12% (3.34% spread + 8.66% real adverse move room)

# ── AI / LLM ──
# Bybit uses Ollama (mistral 7B), Delta uses Claude API (haiku)
# llm_provider: 'auto' = Delta→Claude, Bybit→Ollama | 'claude' | 'ollama'
ai:
  reasoning_provider: "auto"
  reasoning_model: "nexus-scanner"         # Fine-tuned Mistral for pattern scanning (was mistral:latest)
  ollama_base_url: "https://spas-inclusive-breaking-frontier.trycloudflare.com"
  llm_provider: "auto"            # auto: Delta=Claude, Bybit=Ollama
  claude_model: "claude-haiku-4-5" # Cost-effective for trade decisions (~$0.001/call)
  use_llm_trade_decider: true
  llm_trade_decider_mode: "primary"
  llm_trade_conf_threshold: 0.80               # Robinhood: only high-conviction (was 0.60)
  rate_limit_calls_per_minute: 15
  fallback_on_quota_error: true
  use_local_on_failure: true
  bear_agent_enabled: true        # Second LLM call to argue AGAINST the trade
  bear_veto_threshold: 6          # More conservative for Robinhood spread (was 8)
  bear_reduce_threshold: 4        # Reduce earlier — spread makes moderate risk costly (was 6)
  facilitator_enabled: true       # 3rd LLM call: evaluates bull vs bear, makes final call
  risk_personas_enabled: true     # 3 risk perspectives: Aggressive/Neutral/Conservative
  edge_positioning_enabled: true  # Dynamic sizing based on historical win rate
  orchestrator_enabled: true      # 10 math agents + adversarial debate → feeds LLM

# ── Auto-Healer Monitor (GPU LLM) ──
# SAME model as trading (mistral) to avoid GPU model-swap thrashing
# Ollama can only hold 1 model in VRAM — switching causes 5-10s delays + failures
monitor:
  enabled: true
  ollama_url: "https://spas-inclusive-breaking-frontier.trycloudflare.com"
  ollama_model: "mistral:latest"
  scan_interval: 120              # Check logs every 2min (less frequent = less contention)
  auto_fix: true                  # Apply safe fixes (null guards, type casts, defaults)
  max_fixes_per_hour: 5           # Rate limit auto-fixes

# ── Multi-Strategy Engine ──
# Replaces EMA-only gatekeeper with 4 parallel strategies
# Weights shift dynamically based on HMM regime + Hurst exponent
multi_strategy:
  enabled: true
  # Custom weight overrides (optional — regime auto-adjusts if not set)
  # weights:
  #   ema_trend: 0.30
  #   mean_reversion: 0.30
  #   volatility_breakout: 0.20
  #   trend_following: 0.20

# ── Sniper Mode (Patient, High-Conviction Trading) ──
# Waits for multi-confluence perfect setups, compounds profits into bigger positions
# Designed for Robinhood's 1.67% spread: only trades when expected move >> spread cost
sniper:
  enabled: true                        # Default ON for Robinhood paper mode
  min_confluence: 6                    # Need 6+ of 9 signals for Robinhood (was 5 — higher bar for 3.34% spread)
  min_score: 8                         # Higher bar than normal min_entry_score (6)
  min_expected_move_pct: 5.0           # Only enter if expected move > 5% (clears 3.3% round-trip spread)
  compound_pct: 50.0                   # Reinvest 50% of realized profits into next trade
  protect_principal: true              # After first win, only risk profits — never touch original capital extra

# ── Time-Based Exits ──
max_hold_minutes: 10080           # Hold up to 7 DAYS — let big moves develop (was 6 hrs)

# ── MetaTrader 5 ──
# Bridge to MT5 terminal for visual tracking and/or direct execution
# Setup: Install MT5 from broker, enable Algo Trading, pip install MetaTrader5
mt5:
  enabled: true
  mode: execute                      # 'mirror' (visual only) or 'execute' (trade through MT5)
  terminal_path: "C:/Program Files/MetaTrader 5/terminal64.exe"  # Auto-detect if omitted
  login: ${MT5_LOGIN}       # MT5 account number (from .env)
  password: ${MT5_PASSWORD} # MT5 password (from .env)
  server: ${MT5_SERVER}     # Server name (from .env)
  symbol_map:
    BTC: "BTC"                       # MetaQuotes-Demo: iShares Bitcoin Trust ETF
    ETH: "ETH"                       # MetaQuotes-Demo: iShares Ethereum Trust ETF
  lot_size:
    BTC: 1.0                         # Min lot for BTC ETF (1 share)
    ETH: 1.0                         # Min lot for ETH ETF (1 share)
  magic_number: 888888               # Unique EA ID for our trades

# ── Robinhood Crypto (read-only paper tracking) ──
robinhood:
  enabled: true                      # Robinhood Crypto API (read-only)
  assets: [BTC, ETH]
  poll_interval: 30                  # Price snapshot interval (seconds)

# ── Order Execution ──
# LIMIT preferred: places at best bid/ask for instant fill + slippage protection
# Market orders pay the spread
execution:
  entry_type: "limit"
  exit_type: "limit"

# ── Auto Hyperopt (Continuous Parameter Optimization) ──
# Background Optuna optimizer: periodically backtests param combinations
# and updates config.yaml when improvement exceeds threshold
hyperopt:
  enabled: true
  interval_hours: 4                  # Run optimization every 4 hours
  n_trials: 30                       # Optuna trials per cycle
  metric: "profit_factor"            # Metric to maximize (profit_factor, sharpe, sortino, total_pnl, calmar)
  min_improvement_pct: 5.0           # Only update config if improvement > 5%

# ── FreqAI Auto-Retrain ──
# Continuous ML model retraining inspired by Freqtrade's FreqAI module
freqai:
  enabled: true
  retrain_every_trades: 20          # Retrain after N closed trades
  retrain_every_hours: 4            # Retrain every N hours (whichever triggers first)
  min_improvement_pct: 1.0          # New model must beat old by 1%+ to deploy
  assets: [BTC, ETH]
  spread_cost_pct: 3.34             # Robinhood round-trip spread (used in label generation)
  lookback_bars: 1500               # ~250 days of 4h data
  label_threshold: 0.01             # 1% move threshold for directional labels
  optuna_trials: 40                 # Bayesian hyperparameter search trials
  boost_rounds: 400                 # Max LightGBM boosting rounds
  early_stopping_rounds: 30         # Early stopping patience
  validation_pct: 0.15              # Walk-forward validation split
  test_pct: 0.15                    # Held-out test split
  longs_only: true                  # Robinhood: no shorts on spot
  timeframe: "4h"                   # Training timeframe
