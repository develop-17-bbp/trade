  asset_class: STOCK
  venue: alpaca
  paper: true                       # paper soak only until ACT_STOCKS_REAL_CAPITAL_ENABLED=1
  data_feed: iex                    # free-tier IEX; flip to 'sip' on AlgoTrader Plus
  # Active basket — top-100 US large-caps. Each gets the full agentic
  # pipeline (scanner → analyst → conviction gate → executor with
  # EMA trailing SL) every cycle.
  # Rate-limit math: 100 symbols × bar+quote = ~150 calls/min, under
