mode: live
poll_interval: 60

# ── Timeframe profile ──
# Pick one: 'scalp' (5m primary, current default) or 'swing' (1h primary,
# recommended for Robinhood's 1.69% spread). 'position' (4h) for long-
# hold. Env var ACT_TIMEFRAME_PROFILE overrides this key.
timeframe_profile: scalp

# ── Realistic annual-return target ──
# Informational — used by the evaluator/readiness-gate diagnostic to show
# how the current rolling Sharpe maps to an annualised return estimate.
# 25% = realistic on Robinhood-hardened swing; 40% = upper envelope of
# same strategy on a lower-fee venue (Bybit/Delta). NOT a trading gate.
target_annual_return_pct: 25

# ── Funding-rate arbitrage (dormant on Robinhood-only setup) ──
# Only activates when a perp-futures venue (bybit/delta/binance_futures)
# is added to the exchanges list AND funding_arb.enabled=true OR env
# ACT_FUNDING_ARB=1.
funding_arb:
  enabled: false
  min_annualised_pct: 12.0
  notional_usd: 2000
  expected_hold_days: 7

# ── Agentic trade loop (C3 build; default off) ──
# Multi-turn LLM tool-use loop that compiles a TradePlan before any order
# reaches the executor. Keep disabled for now; flip when 14-day paper soak
# proves stable and the operator is ready. Env ACT_AGENTIC_LOOP=1 also flips
# it on. Env ACT_DISABLE_AGENTIC_LOOP=1 forces OFF (overrides config).
agentic_loop:
  enabled: false
  max_steps: 8
  max_context_tokens: 80000
  keep_recent_rounds: 4

# ── Emergency-mode signal (informational) ──
# When rolling Sharpe / target-equivalent Sharpe < emergency_ratio, the
# scheduler halves retrain intervals and autonomous_loop tightens its
# adaptation cadence. NOT a trading gate — the readiness gate still
# controls live-capital promotion.
emergency_mode:
  enabled: true
  ratio: 0.7                  # emergency when sharpe_obs/sharpe_target < this

# ── External MCP servers (C7) ──
# Remote tool sources the Analyst brain can call alongside in-process
# tools. Each server's tools are mirrored into ToolRegistry with a
# namespace prefix (tag). Examples:
#   - url: https://coingecko-mcp.example   tag: cg
#   - url: http://localhost:3100           tag: tv
# Kill switch: ACT_DISABLE_MCP_CLIENTS=1 skips all external registration.
# Headers support ${ENV_VAR} expansion for secret tokens.
mcp_clients: []

# ── Hooks (C8) — operator extension points on named events ──
# Each event is a list of {cmd | python, blocking, timeout_s, name}.
# `blocking: true` on a pre_* / on_authority_* event: a non-zero exit
# VETOES the protected action (place-order, exit, etc.).
# Shell cmd strings expand ${ENV_VAR} and {{context.key}} placeholders.
# Kill switch: ACT_DISABLE_HOOKS=1 disables all hooks.
# Events: pre_trade_submit, post_trade_open, pre_exit, post_trade_close,
#   on_authority_violation, on_emergency_mode_enter/exit,
#   on_strategy_promote, on_startup, on_shutdown.
hooks: {}
exchanges:
- name: robinhood
  assets:
  - BTC
  - ETH
  spread_pct_per_side: 0.845
  round_trip_spread_pct: 1.69
  min_expected_move_pct: 3.0
  longs_only: true
  min_profit_before_exit_pct: 2.5
  min_hold_minutes: 1440
  trailing_lock_pct: 50
  max_hold_days: 7
  trend_only: true
  tf_alignment_override: true
  compound_pct: 50
exchange:
  name: robinhood
assets:
- BTC
- ETH
initial_capital: 100000.0
adaptive:
  ema_crossover_primary: true
  ema_period: 8
  struct_window: 5
  min_entry_score: 4
  max_entry_score: 15
  short_score_penalty: 4
  sr_assets:
  - ETH
  signal_timeframes:
  - 1h
  - 4h
  - 1d
risk:
  daily_loss_limit_pct: 5.0
  max_drawdown_pct: 15.0
  risk_per_trade_pct: 1.0
  atr_stop_mult: 3.0
  atr_tp_mult: 9.0
  hard_stop_pct: -6.0
  min_exit_pnl_pct: 2.5
ai:
  reasoning_provider: auto
  reasoning_model: act-scanner
  # Local Ollama on the same RTX 5090 host. Do not use trycloudflare quick-tunnels
  # here — they expire without notice and silently kill the LLM brain.
  ollama_base_url: http://localhost:11434
  llm_provider: auto
  claude_model: claude-haiku-4-5

  # ── Dual-brain model split (C5d — named profiles, A/B switchable) ──
  #
  # Three brain profiles, env-switchable via ACT_BRAIN_PROFILE=<name>
  # or pinned below via `profile:`. Per-role overrides via
  # ACT_SCANNER_MODEL / ACT_ANALYST_MODEL still win over profile.
  #
  #   dense_r1      — deepseek-r1:32b + deepseek-r1:7b   (default)
  #                   Both DeepSeek-R1 distills (dense). Most
  #                   consistent output. Safest for paper soak —
  #                   fewer variance sources when debugging shadow
  #                   plan quality. ~25 GB combined.
  #
  #   moe_agentic   — qwen3-coder:30b + qwen2.5-coder:7b
  #                   MoE analyst (Qwen3-Coder-30B-A3B, ~3B active)
  #                   + dense coder worker. 2026 agentic gold
  #                   standard; best tool-use speed; less raw
  #                   reasoning depth than R1. ~24 GB combined.
  #
  #   hybrid        — qwen3-coder:30b + deepseek-r1:7b
  #                   MoE agentic analyst + dense R1 scanner.
  #                   Author's recommendation AFTER paper soak
  #                   clears Sharpe ≥ 1.0. ~24 GB combined.
  #
  # A/B workflow on GPU box: leave config at default, set env per
  # week: `setx ACT_BRAIN_PROFILE moe_agentic` for a week, then
  # flip to `hybrid`, then back to `dense_r1`. Compare shadow-plan
  # PnL + rolling Sharpe in warm_store across profiles.
  #
  # See docs/dual_brain_setup.md for Modelfile templates and pull
  # commands. All three profiles fit RTX 5090 32 GB with
  # OLLAMA_NUM_PARALLEL=4.
  dual_brain:
    enabled: true
    profile: dense_r1                   # one of: dense_r1 | moe_agentic | hybrid
    scanner_role: "market_survey"
    analyst_role: "trade_plan_compile"
    fallback_cross: true                # if primary fails, try the other
    # Leave scanner_model / analyst_model unset to use profile defaults.
    # To pin a specific model regardless of profile:
    # scanner_model: deepseek-r1:7b
    # analyst_model: deepseek-r1:32b
    # scanner_temperature: 0.3
    # analyst_temperature: 0.4
  use_llm_trade_decider: true
  llm_trade_decider_mode: primary
  llm_trade_conf_threshold: 0.8
  rate_limit_calls_per_minute: 15
  fallback_on_quota_error: true
  use_local_on_failure: true
  bear_agent_enabled: true
  bear_veto_threshold: 8
  bear_reduce_threshold: 5
  facilitator_enabled: true
  risk_personas_enabled: true
  edge_positioning_enabled: true
  orchestrator_enabled: true
monitor:
  enabled: true
  ollama_url: http://localhost:11434
  ollama_model: devstral:24b
  scan_interval: 120
  auto_fix: true
  max_fixes_per_hour: 5
multi_strategy:
  enabled: true
sniper:
  enabled: true
  min_confluence: 5
  min_score: 6
  min_expected_move_pct: 5.0
  # Robinhood-hardening (intervention A): signals between 2.5% and 5%
  # expected move are accepted as NORMAL tier (1x size). Below 2.5% rejected.
  # Requires ACT_ROBINHOOD_HARDEN=1 env flag to activate.
  normal_min_expected_move_pct: 2.5
  compound_pct: 50.0
  protect_principal: true
max_hold_minutes: 10080
mt5:
  enabled: true
  mode: execute
  terminal_path: C:/Program Files/MetaTrader 5/terminal64.exe
  login: ${MT5_LOGIN}
  password: ${MT5_PASSWORD}
  server: ${MT5_SERVER}
  symbol_map:
    BTC: BTC
    ETH: ETH
  lot_size:
    BTC: 1.0
    ETH: 1.0
  magic_number: 888888
robinhood:
  enabled: true
  assets:
  - BTC
  - ETH
  poll_interval: 30
execution:
  entry_type: limit
  exit_type: limit
hyperopt:
  enabled: true
  interval_hours: 4
  n_trials: 30
  metric: profit_factor
  min_improvement_pct: 5.0
freqai:
  enabled: true
  retrain_every_trades: 20
  retrain_every_hours: 4
  min_improvement_pct: 1.0
  assets:
  - BTC
  - ETH
  spread_cost_pct: 1.69
  lookback_bars: 1500
  label_threshold: 0.01
  optuna_trials: 40
  boost_rounds: 400
  early_stopping_rounds: 30
  validation_pct: 0.15
  test_pct: 0.15
  longs_only: true
  timeframe: 4h
roi_table:
  0: 6.0
  30: 4.0
  120: 3.0
  360: 2.5
  720: 2.0
  1440: -1.0
