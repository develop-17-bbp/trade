# ── General Settings ──
mode: testnet                  # execution mode: 'paper', 'testnet', or 'live'
poll_interval: 30             # interval between iterations in seconds (fast for testnet forcing)

# ── Exchange Configuration (for testnet/live) ──
# Get API keys from: https://testnet.binance.vision/ (testnet)
#                 or https://www.binance.com/en/user/settings/api-management (live)
exchange:
  name: binance
  # API keys loaded from .env (BINANCE_API_KEY / BINANCE_TESTNET_KEY)
  # Never commit credentials here — use environment variables

# ── Assets to trade ──
# For PAPER mode: use AAVE (we have CSV data)
# For TESTNET/LIVE: use BTC, ETH
assets:
  - BTC
  - ETH
  - AAVE

initial_capital: 100000.0      # Starting capital in USD (just for tracking initial state)

# ── L1 Quantitative Engine ──
l1:
  short_window: 5
  long_window: 20
  vol_threshold: 1.5

# ── L2 Sentiment Rules ──
sentiment:
  fear_threshold: 0.3
  greed_threshold: 0.7

# ── Risk Parameters ──
risk:
  max_position_size_pct: 0.25
  daily_loss_limit_pct: 3.0         # Reduced for safety
  max_drawdown_pct: 10.0            # Reduced for safety
  risk_per_trade_pct: 0.5           # Risk 0.5% of equity per trade
  atr_stop_mult: 1.5                # Stop Loss = 1.5x ATR (tighter stop, better R:R)
  atr_tp_mult: 4.5                  # Take Profit = 4.5x ATR (wider TP, R:R=3.0)

# ── Signal Generation Settings ──
signal:
  min_confidence: 0.75              # Raised to 0.75 (only high-conviction setups)
  use_ensemble: true                # Use L1+L2+L3 ensemble
  neutral_threshold: 0.50           # Below this = directional entry
  
# ── Testnet Trading Mode ──
testnet_aggressive: false           # Conservative pacing still enabled
max_trades_per_hour: 5              # Reduced from 20 (quality over quantity)
force_trade: false                  # Disabled: was forcing weak-signal trades, hurting win rate

# ── Models ──
models:
  lightgbm:
    model_path: "models/lgbm_aave.txt"  # Trained LightGBM classifier for AAVE/USDT

# ── AI Reasoning Layer ──
ai:
  reasoning_provider: "auto"                # 'auto' = smart detection: cloud API → local Ollama → rule-based
  reasoning_model: "mistral"                 # Default local model (Ollama mistral, already installed)

  # Default false to avoid segfault on Python 3.14 / ARM; set true to enable full ML stack
  use_lightgbm: true
  use_patch_tst: false

  # Rate Limiting (to avoid quota exhaustion)
  rate_limit_calls_per_minute: 15     # Conservative rate limiter for free tier
  rate_limit_enabled: true            # Enable rate limiting

  # Fallback Strategy (auto-switch on quota/error)
  fallback_on_quota_error: true       # Fall back to local/rule-based on quota exceeded
  use_local_on_failure: true          # Always try local Ollama before rule-based

# ── Multi-Agent Intelligence Overlay ──
agents:
  enabled: true                         # Master switch for 12-agent overlay
  blend_weight: 0.30                    # 30% agent overlay, 70% existing pipeline (agents over-trusted)
  consensus_threshold: 0.70             # Need 70% agent consensus for directional trade
  weight_update_alpha: 0.15             # Bayesian EMA learning rate for agent weights
  loss_prevention:
    daily_target_pct: 1.0               # Target: +1% daily profit
    preservation_threshold_pct: 0.8     # Enter PRESERVATION mode at +0.8%
    caution_threshold_pct: -0.5         # Enter CAUTION mode at -0.5%
    halt_threshold_pct: -1.0            # HALT all trading at -1.0%
    intraday_drawdown_pause_pct: 2.0    # Pause 30 min on 2% intraday drawdown

# ── Polymarket Prediction Market Integration ──
polymarket:
  enabled: true                         # Fetch prediction market probabilities
  divergence_threshold: 0.15            # 15% probability divergence to trigger signal
  volume_threshold: 10000               # Minimum market volume in USD
  max_signal_strength: 0.8              # Cap agent confidence from Polymarket signals

# ── Runtime Data Paths ──
# Defaults to ~/.trade/ — set TRADE_DATA_ROOT env var to override
# Future: set log_backend: "postgres" for AWS RDS
paths:
  data_root: ""        # empty = use ~/.trade (or TRADE_DATA_ROOT env var)
  log_backend: "file"  # "file" | "postgres" (future)
  # postgres_dsn: "postgresql://user:pass@host:5432/trade_logs"

