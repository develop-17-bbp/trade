# ── General Settings ──
mode: testnet                  # execution mode: 'paper', 'testnet', or 'live'
poll_interval: 10             # check every 10s, analyze 5m candles, trade on crossovers

# ── Exchange Configuration ──
# Both exchanges run independently with same strategy
exchanges:
  - name: bybit
    assets: [BTC, ETH]
  - name: delta
    assets: [BTC, ETH]

# Primary exchange (for backward compatibility)
exchange:
  name: bybit

# ── Assets ──
assets:
  - BTC
  - ETH

initial_capital: 100000.0

# ── EMA Crossover Strategy ──
adaptive:
  ema_crossover_primary: true
  ema_period: 8                                # EMA period (matches chart)
  struct_window: 5                             # Structure points for SL (L1->L4)
  min_entry_score: 4                           # Hard gate: block trades below this score before LLM call

# ── Risk (minimal — daily loss limit only) ──
risk:
  daily_loss_limit_pct: 3.0
  max_drawdown_pct: 10.0
  risk_per_trade_pct: 0.5
  atr_stop_mult: 1.5
  atr_tp_mult: 4.5

# ── AI / LLM ──
# Bybit uses Ollama (mistral 7B), Delta uses Claude API (haiku)
# llm_provider: 'auto' = Delta→Claude, Bybit→Ollama | 'claude' | 'ollama'
ai:
  reasoning_provider: "auto"
  reasoning_model: "mistral:latest"
  ollama_base_url: "https://spas-inclusive-breaking-frontier.trycloudflare.com"
  llm_provider: "auto"            # auto: Delta=Claude, Bybit=Ollama
  claude_model: "claude-haiku-4-5" # Cost-effective for trade decisions (~$0.001/call)
  use_llm_trade_decider: true
  llm_trade_decider_mode: "primary"
  llm_trade_conf_threshold: 0.60
  rate_limit_calls_per_minute: 15
  fallback_on_quota_error: true
  use_local_on_failure: true
  bear_agent_enabled: true        # Second LLM call to argue AGAINST the trade
  bear_veto_threshold: 7          # risk_score >= 7 = VETO (protects capital)
  bear_reduce_threshold: 5        # risk_score 5-6 = reduce position 50%
  facilitator_enabled: true       # 3rd LLM call: evaluates bull vs bear, makes final call
  risk_personas_enabled: true     # 3 risk perspectives: Aggressive/Neutral/Conservative
  edge_positioning_enabled: true  # Dynamic sizing based on historical win rate
  orchestrator_enabled: true      # 10 math agents + adversarial debate → feeds LLM

# ── Auto-Healer Monitor (GPU LLM) ──
# SAME model as trading (mistral) to avoid GPU model-swap thrashing
# Ollama can only hold 1 model in VRAM — switching causes 5-10s delays + failures
monitor:
  enabled: true
  ollama_url: "https://spas-inclusive-breaking-frontier.trycloudflare.com"
  ollama_model: "mistral:latest"
  scan_interval: 120              # Check logs every 2min (less frequent = less contention)
  auto_fix: true                  # Apply safe fixes (null guards, type casts, defaults)
  max_fixes_per_hour: 5           # Rate limit auto-fixes

# ── Time-Based Exits ──
max_hold_minutes: 360             # Close stale/losing positions after 6 hours

# ── Order Execution ──
# LIMIT preferred: places at best bid/ask for instant fill + slippage protection
# Market orders pay the spread and can slip badly on thin testnet books
execution:
  entry_type: "limit"
  exit_type: "limit"
