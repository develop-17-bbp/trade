- name: alpaca_crypto
  # Optional alpaca-crypto venue. Disabled by default; enable on the 4060
  # by setting ACT_BOX_ROLE="stocks,crypto" (comma-separated to run both
  # stocks and crypto in parallel threads). Same Alpaca paper account as
  # the stocks-side alpaca exchange — paper P&L is shared.
  enabled: false
  asset_class: CRYPTO
  venue: alpaca
  paper: true
  data_feed: iex                    # crypto on Alpaca uses CCC-aggregated feed regardless
  poll_seconds: 60
  assets:
  - BTC
  - ETH
  spread_pct_per_side: 0.15         # Alpaca crypto spread ~0.30% round-trip (vs RH 1.69%)
  round_trip_spread_pct: 0.30
  min_expected_move_pct: 0.50       # Looser than stocks (crypto runs 24/7, more setups)
  intraday_position_pct_max: 15
  overnight_position_pct_max: 15    # crypto fine to hold overnight (no daily-reset decay)
  rth_only: false                   # 24/7 venue
- name: alpaca_options
  # Alpaca options Level 3 (long calls/puts + multi-leg spreads).
