# ── General Settings ──
mode: testnet                  # execution mode: 'paper', 'testnet', or 'live'
poll_interval: 30             # interval between iterations in seconds (fast for testnet forcing)

# ── Exchange Configuration (for testnet/live) ──
# Get API keys from: https://testnet.binance.vision/ (testnet)
#                 or https://www.binance.com/en/user/settings/api-management (live)
exchange:
  name: binance
  api_key: "8kkHSN8sjB9xfFQerIweu1jLKbr3cGLshtjka55exPYhfpDqX3OaxjQLnNB3cnhF"
  api_secret: "sG6hPUEYsRAeRJtvy0jIkclafmyqbqBOHjOouyTt1UYHe6GEeiUHdQWTXghSM6OV"

# ── Assets to trade ──
# For PAPER mode: use AAVE (we have CSV data)
# For TESTNET/LIVE: use BTC, ETH
assets:
  - BTC
  - ETH
  - AAVE

initial_capital: 100000.0      # Starting capital in USD (just for tracking initial state)

# ── L1 Quantitative Engine ──
l1:
  short_window: 5
  long_window: 20
  vol_threshold: 1.5

# ── L2 Sentiment Rules ──
sentiment:
  fear_threshold: 0.3
  greed_threshold: 0.7

# ── Risk Parameters ──
risk:
  max_position_size_pct: 2.0
  daily_loss_limit_pct: 5.0        # Increased to 5% (more tolerance)
  max_drawdown_pct: 15.0            # Increased to 15% (more tolerance)
  risk_per_trade_pct: 1.0           # risk 1% of equity per trade
  atr_stop_mult: 2.0                # Stop Loss = 2x ATR
  atr_tp_mult: 3.0                  # Take Profit = 3x ATR

# ── Signal Generation Settings ──
signal:
  min_confidence: 0.45              # Lowered for testnet to force more signals
  use_ensemble: true                # Use L1+L2+L3 ensemble
  neutral_threshold: 0.40           # Below this = strong signal
  
# ── Testnet Trading Mode ──
testnet_aggressive: true            # More aggressive on testnet (fake money)
max_trades_per_hour: 20             # High limit for testnet — force trades
force_trade: true                   # Force trades even on weak signals (TESTNET ONLY)

# ── Models ──
models:
  lightgbm:
    model_path: "models/lgbm_aave.txt"  # Trained LightGBM classifier for AAVE/USDT

# ── AI Reasoning Layer ──
ai:
  reasoning_provider: "google"              # 'google' (Gemini), 'openai', or 'local'
  reasoning_model: "gemini-1.5-flash"       # Google Gemini model
  
  # Rate Limiting (to avoid quota exhaustion)
  rate_limit_calls_per_minute: 15     # Conservative rate limiter for free tier
  rate_limit_enabled: true            # Enable rate limiting
  
  # Fallback Strategy (auto-switch on quota/error)
  fallback_on_quota_error: true       # Fall back to rule-based on quota exceeded
  use_local_on_failure: true          # Set to true to use Ollama on failure

