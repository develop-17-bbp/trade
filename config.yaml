mode: live
poll_interval: 60
exchanges:
- name: robinhood
  assets:
  - BTC
  - ETH
  spread_pct_per_side: 0.845
  round_trip_spread_pct: 1.69
  min_expected_move_pct: 3.0
  longs_only: true
  min_profit_before_exit_pct: 2.5
  min_hold_minutes: 1440
  trailing_lock_pct: 50
  max_hold_days: 7
  trend_only: true
  tf_alignment_override: true
  compound_pct: 50
exchange:
  name: robinhood
assets:
- BTC
- ETH
initial_capital: 100000.0
adaptive:
  ema_crossover_primary: true
  ema_period: 8
  struct_window: 5
  min_entry_score: 4
  max_entry_score: 15
  short_score_penalty: 4
  sr_assets:
  - ETH
  signal_timeframes:
  - 1h
  - 4h
  - 1d
risk:
  daily_loss_limit_pct: 5.0
  max_drawdown_pct: 15.0
  risk_per_trade_pct: 1.0
  atr_stop_mult: 3.0
  atr_tp_mult: 9.0
  hard_stop_pct: -6.0
  min_exit_pnl_pct: 2.5
ai:
  reasoning_provider: auto
  reasoning_model: act-scanner
  # Local Ollama on the same RTX 5090 host. Do not use trycloudflare quick-tunnels
  # here — they expire without notice and silently kill the LLM brain.
  ollama_base_url: http://localhost:11434
  llm_provider: auto
  claude_model: claude-haiku-4-5
  use_llm_trade_decider: true
  llm_trade_decider_mode: primary
  llm_trade_conf_threshold: 0.8
  rate_limit_calls_per_minute: 15
  fallback_on_quota_error: true
  use_local_on_failure: true
  bear_agent_enabled: true
  bear_veto_threshold: 8
  bear_reduce_threshold: 5
  facilitator_enabled: true
  risk_personas_enabled: true
  edge_positioning_enabled: true
  orchestrator_enabled: true
monitor:
  enabled: true
  ollama_url: https://spas-inclusive-breaking-frontier.trycloudflare.com
  ollama_model: mistral:latest
  scan_interval: 120
  auto_fix: true
  max_fixes_per_hour: 5
multi_strategy:
  enabled: true
sniper:
  enabled: true
  min_confluence: 5
  min_score: 6
  min_expected_move_pct: 5.0
  # Robinhood-hardening (intervention A): signals between 2.5% and 5%
  # expected move are accepted as NORMAL tier (1x size). Below 2.5% rejected.
  # Requires ACT_ROBINHOOD_HARDEN=1 env flag to activate.
  normal_min_expected_move_pct: 2.5
  compound_pct: 50.0
  protect_principal: true
max_hold_minutes: 10080
mt5:
  enabled: true
  mode: execute
  terminal_path: C:/Program Files/MetaTrader 5/terminal64.exe
  login: ${MT5_LOGIN}
  password: ${MT5_PASSWORD}
  server: ${MT5_SERVER}
  symbol_map:
    BTC: BTC
    ETH: ETH
  lot_size:
    BTC: 1.0
    ETH: 1.0
  magic_number: 888888
robinhood:
  enabled: true
  assets:
  - BTC
  - ETH
  poll_interval: 30
execution:
  entry_type: limit
  exit_type: limit
hyperopt:
  enabled: true
  interval_hours: 4
  n_trials: 30
  metric: profit_factor
  min_improvement_pct: 5.0
freqai:
  enabled: true
  retrain_every_trades: 20
  retrain_every_hours: 4
  min_improvement_pct: 1.0
  assets:
  - BTC
  - ETH
  spread_cost_pct: 1.69
  lookback_bars: 1500
  label_threshold: 0.01
  optuna_trials: 40
  boost_rounds: 400
  early_stopping_rounds: 30
  validation_pct: 0.15
  test_pct: 0.15
  longs_only: true
  timeframe: 4h
roi_table:
  0: 6.0
  30: 4.0
  120: 3.0
  360: 2.5
  720: 2.0
  1440: -1.0
